name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    paths:
      - ".github/workflows/**"
      - "bench/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vitest.config.ts"
  push:
    branches:
      - main
      - "release/**"
    paths:
      - ".github/workflows/**"
      - "bench/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vitest.config.ts"
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Run the release agent in plan mode or apply mode."
        type: choice
        required: true
        default: plan
        options:
          - plan
          - apply
      release_base:
        description: "Optional base tag/ref. Defaults to the latest merged v* tag."
        type: string
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_mode || 'ci' }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast required checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    outputs:
      release_eligible: ${{ steps.release_eligibility.outputs.release_eligible }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type lint
        run: pnpm type-lint

      - name: Node runtime script smoke
        run: node --experimental-strip-types ./src/scripts/release-agent.ts --base HEAD

      - name: Node package smoke
        run: pnpm test:package-bin

      - name: MCP stdio smoke
        run: pnpm exec vitest run tests/interface.test.ts -t "boots the SDK-backed MCP stdio server"

      - name: Version policy
        if: github.event_name == 'pull_request'
        run: |
          git reset --soft "origin/${{ github.base_ref }}"
          pnpm check:version-bump

      - name: Version policy on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git reset --soft "${{ github.event.before }}"
          pnpm check:version-bump

      - name: Check automatic release eligibility
        id: release_eligibility
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          merged_release_prs="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '[.[] | select(.merged_at != null and .base.ref == "main" and any(.labels[]; .name == "release"))] | length')"
          if [ "$merged_release_prs" -gt 0 ]; then
            echo "release_eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_eligible=false" >> "$GITHUB_OUTPUT"
          fi

  windows:
    name: Windows compatibility
    runs-on: windows-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-lint
      - name: Windows filesystem scan
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/filesystem-scan.test.ts
      - name: Windows engine behavior
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/engine-behavior.test.ts
      - name: Windows Git checkout
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/git-checkout.test.ts
      - name: Windows watch backend
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/watch-backend.test.ts
      - name: Windows watch boundary
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/watch-boundary.test.ts
      - run: pnpm test:package-bin

  release_agent:
    name: Release agent
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [fast, windows]
    if: >-
      always() && ((github.event_name == 'workflow_dispatch' && needs.fast.result == 'success' && needs.windows.result == 'success') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.fast.result == 'success' && needs.windows.result == 'success' &&
      needs.fast.outputs.release_eligible == 'true' && !startsWith(github.event.head_commit.message, 'Release ')))
    permissions:
      contents: write
      pull-requests: write
      actions: write
    env:
      RELEASE_MODE: ${{ github.event_name == 'push' && 'apply' || inputs.release_mode }}
      RELEASE_BASE: ${{ inputs.release_base || '' }}
      RELEASE_FORCE_PATCH: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode == 'apply' && 'true' || 'false' }}
    steps:
      - name: Refuse apply mode outside main
        if: env.RELEASE_MODE == 'apply' && github.ref != 'refs/heads/main'
        run: |
          echo "Release apply mode must run from main."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Decide release
        id: release
        run: |
          release_args=()
          if [ "$RELEASE_MODE" = "apply" ]; then
            release_args+=(--apply)
          fi
          if [ "$RELEASE_FORCE_PATCH" = "true" ]; then
            release_args+=(--force-patch)
          fi
          if [ -n "$RELEASE_BASE" ]; then
            release_args+=(--base "$RELEASE_BASE")
          fi
          node --experimental-strip-types ./src/scripts/release-agent.ts "${release_args[@]}"

      - name: Create release pull request
        id: release_pr
        if: env.RELEASE_MODE == 'apply' && steps.release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json tests/engine-contract.test.ts
          if ! git diff --cached --quiet; then
            node --experimental-strip-types ./src/scripts/check-version-bump.ts
            git commit -m "Release ${{ steps.release.outputs.target_version }}"
            release_branch="release/${{ steps.release.outputs.target_version }}"
            git push origin "HEAD:${release_branch}"
            gh pr create \
              --base main \
              --head "${release_branch}" \
              --title "Release ${{ steps.release.outputs.target_version }}" \
              --body "Automated release-version transaction. Merge after the required CI checks pass." \
              --label release
            echo "release_pr_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_pr_created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push release tag
        if: >-
          env.RELEASE_MODE == 'apply' && steps.release.outputs.should_release == 'true' &&
          steps.release_pr.outputs.release_pr_created == 'false'
        run: |
          git tag "${{ steps.release.outputs.target_tag }}"
          git push origin "${{ steps.release.outputs.target_tag }}"

      - name: Trigger trusted npm publication
        if: >-
          env.RELEASE_MODE == 'apply' && steps.release.outputs.should_release == 'true' &&
          steps.release_pr.outputs.release_pr_created == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run Release --ref "${{ steps.release.outputs.target_tag }}"
