name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type lint
        run: pnpm type-lint

      - name: Test
        run: pnpm test

      - name: Package smoke
        run: pnpm test:package-bin

      - name: Version policy
        if: github.event_name == 'pull_request'
        run: |
          git reset --soft "origin/${{ github.base_ref }}"
          pnpm check:version-bump
