name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    paths:
      - ".github/workflows/**"
      - "bench/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vitest.config.ts"
  push:
    branches:
      - main
      - "release/**"
    paths:
      - ".github/workflows/**"
      - "bench/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vitest.config.ts"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to retry after an npm publication failure."
        type: string
        required: true

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'ci' }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast required checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name != 'workflow_dispatch' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type lint
        run: pnpm type-lint

      - name: Node runtime script smoke
        run: node --experimental-strip-types ./src/scripts/release-agent.ts --base HEAD

      - name: Node package smoke
        run: pnpm test:package-bin

      - name: MCP stdio smoke
        run: pnpm exec vitest run tests/interface.test.ts -t "boots the SDK-backed MCP stdio server"

      - name: Version policy
        if: github.event_name == 'pull_request'
        run: |
          git reset --soft "origin/${{ github.base_ref }}"
          pnpm check:version-bump

      - name: Version policy on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git reset --soft "${{ github.event.before }}"
          pnpm check:version-bump

  # Kept intact for a future re-enable. Set this back to the original draft
  # condition and add `windows` back to `release_agent.needs` when hosted
  # Windows minutes are available again.
  windows:
    name: Windows compatibility
    runs-on: windows-latest
    timeout-minutes: 15
    if: ${{ false }} # Disabled: avoid paid GitHub-hosted Windows runner minutes.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-lint
      - name: Windows filesystem scan
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/filesystem-scan.test.ts
      - name: Windows engine behavior
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/engine-behavior.test.ts
      - name: Windows Git checkout
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/git-checkout.test.ts
      - name: Windows watch backend
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/watch-backend.test.ts
      - name: Windows watch boundary
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/watch-boundary.test.ts
      - run: pnpm test:package-bin

  release_agent:
    name: Tag and publish merged release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [fast]
    if: >-
      always() && github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.fast.result == 'success'
    permissions:
      contents: write
      pull-requests: read
      id-token: write
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Read merged PR release exception
        id: release_exception
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          no_release="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '[.[] | select(.merged_at != null and .base.ref == "main") | any(.labels[]; .name == "no-release")] | any' || echo false)"
          echo "no_release=${no_release}" >> "$GITHUB_OUTPUT"

      - name: Decide release
        id: release
        run: |
          set -o pipefail
          args=(--merged-candidate)
          if [ "${{ steps.release_exception.outputs.no_release }}" = "true" ]; then
            args+=(--no-release)
          fi
          node --experimental-strip-types ./src/scripts/release-agent.ts "${args[@]}" \
            | tee "$RUNNER_TEMP/astrograph-release-decision.json"
          {
            echo "## Astrograph release decision"
            echo
            echo "Candidate SHA: \`${GITHUB_SHA}\`"
            echo
            echo '```json'
            cat "$RUNNER_TEMP/astrograph-release-decision.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if jq -e '.transactionAction == "reject"' \
            "$RUNNER_TEMP/astrograph-release-decision.json" >/dev/null; then
            echo "Release candidate was rejected before tag or npm publication."
            exit 1
          fi

      - name: Push release tag
        if: steps.release.outputs.should_release == 'true'
        run: |
          git tag "${{ steps.release.outputs.target_tag }}"
          git push origin "${{ steps.release.outputs.target_tag }}"

      - name: Record tag result
        if: steps.release.outputs.should_release == 'true'
        run: |
          {
            echo
            echo "Tag pushed: \`${{ steps.release.outputs.target_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish trusted npm release
        if: steps.release.outputs.should_release == 'true'
        run: npm publish --provenance --access public --tag latest

      - name: Record publication result
        if: steps.release.outputs.should_release == 'true'
        run: |
          {
            echo
            echo "npm published: \`astrograph@${{ steps.release.outputs.target_version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  retry_publish:
    name: Retry a tagged npm publication
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          expected_tag="v$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "Release tag '$RELEASE_TAG' does not match package version '$expected_tag'."
            exit 1
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Publish trusted npm release
        run: npm publish --provenance --access public --tag latest
