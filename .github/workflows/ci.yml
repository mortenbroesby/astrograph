name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    paths:
      - ".github/workflows/**"
      - "bench/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vitest.config.ts"
  push:
    branches:
      - main
      - "release/**"
    paths:
      - ".github/workflows/**"
      - "bench/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vitest.config.ts"
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Run the release agent in plan mode or apply mode."
        type: choice
        required: true
        default: plan
        options:
          - plan
          - apply
      release_base:
        description: "Optional base tag/ref. Defaults to the latest merged v* tag."
        type: string
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_mode || 'ci' }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast required checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    outputs:
      release_eligible: ${{ steps.release_eligibility.outputs.release_eligible }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type lint
        run: pnpm type-lint

      - name: Node runtime script smoke
        run: node --experimental-strip-types ./src/scripts/release-agent.ts --base HEAD

      - name: Node package smoke
        run: pnpm test:package-bin

      - name: MCP stdio smoke
        run: pnpm exec vitest run tests/interface.test.ts -t "boots the SDK-backed MCP stdio server"

      - name: Version policy
        if: github.event_name == 'pull_request'
        run: |
          git reset --soft "origin/${{ github.base_ref }}"
          pnpm check:version-bump

      - name: Version policy on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git reset --soft "${{ github.event.before }}"
          pnpm check:version-bump

      - name: Check automatic release eligibility
        id: release_eligibility
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          merged_release_prs="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '[.[] | select(.merged_at != null and .base.ref == "main" and any(.labels[]; .name == "release"))] | length')"
          if [ "$merged_release_prs" -gt 0 ]; then
            echo "release_eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_eligible=false" >> "$GITHUB_OUTPUT"
          fi

  # Kept intact for a future re-enable. Set this back to the original draft
  # condition and add `windows` back to `release_agent.needs` when hosted
  # Windows minutes are available again.
  windows:
    name: Windows compatibility
    runs-on: windows-latest
    timeout-minutes: 15
    if: ${{ false }} # Disabled: avoid paid GitHub-hosted Windows runner minutes.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-lint
      - name: Windows filesystem scan
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/filesystem-scan.test.ts
      - name: Windows engine behavior
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/engine-behavior.test.ts
      - name: Windows Git checkout
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/git-checkout.test.ts
      - name: Windows watch backend
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/watch-backend.test.ts
      - name: Windows watch boundary
        shell: pwsh
        run: ./scripts/run-windows-vitest.ps1 tests/watch-boundary.test.ts
      - run: pnpm test:package-bin

  release_agent:
    name: Tag and publish merged release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [fast]
    if: >-
      always() && github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.fast.result == 'success'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Read merged PR release exception
        id: release_exception
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          no_release="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '[.[] | select(.merged_at != null and .base.ref == "main") | any(.labels[]; .name == "no-release")] | any' || echo false)"
          echo "no_release=${no_release}" >> "$GITHUB_OUTPUT"

      - name: Decide release
        id: release
        run: |
          args=(--merged-candidate)
          if [ "${{ steps.release_exception.outputs.no_release }}" = "true" ]; then
            args+=(--no-release)
          fi
          node --experimental-strip-types ./src/scripts/release-agent.ts "${args[@]}"

      - name: Push release tag
        if: steps.release.outputs.should_release == 'true'
        run: |
          git tag "${{ steps.release.outputs.target_tag }}"
          git push origin "${{ steps.release.outputs.target_tag }}"

      - name: Publish trusted npm release
        if: steps.release.outputs.should_release == 'true'
        run: npm publish --provenance --access public --tag latest
