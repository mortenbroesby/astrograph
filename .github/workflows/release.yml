name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to retry (for example v0.5.1-alpha.155)."
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-retry-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # npm trusted publishing requires npm 11.5.1+, supplied by Node 24.
          # This does not change Astrograph's supported consumer runtime (Node 22+).
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          expected_tag="v$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "Release tag '$RELEASE_TAG' does not match package version '$expected_tag'."
            exit 1
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Publish
        run: npm publish --provenance --access public --tag latest
