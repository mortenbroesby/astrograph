<svg width="720" height="220" viewBox="0 0 720 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Astrograph logo</title>
  <desc id="desc">A vector mark showing an orbital code graph next to the Astrograph wordmark.</desc>
  <defs>
    <linearGradient id="markGradient" x1="38" y1="24" x2="190" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="markGradientDark" x1="38" y1="24" x2="190" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.52" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <linearGradient id="wordGradient" x1="230" y1="62" x2="658" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.62" stop-color="#334155"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="wordGradientDark" x1="230" y1="62" x2="658" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.62" stop-color="#CBD5E1"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadowDark" x="0" y="0" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#E2E8F0" flood-opacity="0.16"/>
    </filter>
    <style>
      .iconShadow { filter: url(#softShadow); }
      .iconBg { fill: #FFFFFF; }
      .iconRing { fill: none; stroke: url(#markGradient); stroke-width: 12; }
      .orbitLine { fill: none; stroke: #0F172A; stroke-width: 8; stroke-linecap: round; }
      .orbitNode { fill: #0F172A; }
      .centerCut { fill: #FFFFFF; }
      .centerTextStroke { fill: none; stroke: #FFFFFF; stroke-width: 4; stroke-linecap: round; }
      .wordmark { fill: url(#wordGradient); stroke: none; stroke-width: 0; }
      .subtitle { fill: #64748B; }

      @media (prefers-color-scheme: dark) {
        .iconShadow { filter: url(#softShadowDark); }
        .iconBg { fill: #0B1220; }
        .iconRing { stroke: url(#markGradientDark); }
        .orbitLine { stroke: #E2E8F0; }
        .orbitNode { fill: #E2E8F0; }
        .centerCut { fill: #0F172A; }
        .centerTextStroke { stroke: #0B1220; }
        .wordmark { fill: url(#wordGradientDark); stroke: #0F172A; stroke-width: 0.8; paint-order: stroke fill; }
        .subtitle { fill: #94A3B8; }
      }
    </style>
  </defs>

  <g class="iconShadow">
    <circle class="iconBg" cx="110" cy="110" r="78"/>
    <circle cx="110" cy="110" r="70" class="iconRing"/>
    <path d="M58 132C82 91 124 71 164 80" class="orbitLine"/>
    <path d="M62 84C104 112 135 147 146 184" class="orbitLine"/>
    <path d="M89 48C96 93 121 128 162 153" class="orbitLine"/>
    <circle cx="58" cy="132" r="12" class="orbitNode"/>
    <circle cx="89" cy="48" r="12" class="orbitNode"/>
    <circle cx="164" cy="80" r="12" class="orbitNode"/>
    <circle cx="146" cy="184" r="12" class="orbitNode"/>
    <circle cx="110" cy="110" r="18" class="centerCut"/>
    <path d="M102 108H118M110 100V116" class="centerTextStroke"/>
  </g>

  <g>
    <text x="230" y="116" class="wordmark" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="70" font-weight="800" letter-spacing="0">Astrograph</text>
    <text x="234" y="154" class="subtitle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="600" letter-spacing="0.5">local code intelligence for agents</text>
  </g>
</svg>
