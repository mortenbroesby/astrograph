<svg width="720" height="220" viewBox="0 0 720 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Astrograph logo</title>
  <desc id="desc">A vector mark showing an orbital code graph next to the Astrograph wordmark.</desc>
  <defs>
    <linearGradient id="markGradient" x1="38" y1="24" x2="190" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="wordGradient" x1="230" y1="62" x2="658" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.62" stop-color="#334155"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <circle cx="110" cy="110" r="78" fill="#FFFFFF"/>
    <circle cx="110" cy="110" r="70" stroke="url(#markGradient)" stroke-width="12"/>
    <path d="M58 132C82 91 124 71 164 80" stroke="#0F172A" stroke-width="8" stroke-linecap="round"/>
    <path d="M62 84C104 112 135 147 146 184" stroke="#0F172A" stroke-width="8" stroke-linecap="round"/>
    <path d="M89 48C96 93 121 128 162 153" stroke="#0F172A" stroke-width="8" stroke-linecap="round"/>
    <circle cx="58" cy="132" r="12" fill="#22D3EE"/>
    <circle cx="89" cy="48" r="12" fill="#6366F1"/>
    <circle cx="164" cy="80" r="12" fill="#F43F5E"/>
    <circle cx="146" cy="184" r="12" fill="#14B8A6"/>
    <circle cx="110" cy="110" r="18" fill="#0F172A"/>
    <path d="M102 108H118M110 100V116" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g>
    <text x="230" y="116" fill="url(#wordGradient)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="70" font-weight="800" letter-spacing="0">Astrograph</text>
    <text x="234" y="154" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="600" letter-spacing="0.5">local code intelligence for agents</text>
  </g>
</svg>
