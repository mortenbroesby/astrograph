<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Astrograph docs journey diagram</title>
  <desc id="desc">A docs map showing new readers starting with concepts and first steps, then branching into workflows, guides, and reference.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 18; ry: 18; }
      .start { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 18; ry: 18; }
      .path { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .eyebrow { font: 600 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #475569; }
      .h { font: 700 28px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .t { font: 600 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .s { font: 500 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="500" rx="28" ry="28"/>

  <text class="eyebrow" x="80" y="70">Docs Reading Path</text>
  <text class="h" x="80" y="112">Start with the mental model, then branch by need</text>
  <text class="s" x="80" y="144">Use the compendium as a guided journey when evaluating Astrograph, then switch to guides or reference once you know what you need.</text>

  <rect class="start" x="80" y="214" width="180" height="96"/>
  <text class="t" x="112" y="265">New here?</text>
  <text class="s" x="112" y="292">Start at the top</text>

  <rect class="card" x="320" y="214" width="180" height="96"/>
  <text class="t" x="354" y="265">Concepts</text>
  <text class="s" x="354" y="292">Thesis and category</text>

  <rect class="card" x="560" y="214" width="180" height="96"/>
  <text class="t" x="588" y="265">First Steps</text>
  <text class="s" x="588" y="292">Install and first use</text>

  <rect class="card" x="820" y="150" width="220" height="96"/>
  <text class="t" x="852" y="201">Retrieval Workflows</text>
  <text class="s" x="852" y="228">How to use Astrograph well</text>

  <rect class="card" x="820" y="278" width="220" height="96"/>
  <text class="t" x="870" y="329">CLI Reference</text>
  <text class="s" x="870" y="356">Commands and examples</text>

  <rect class="card" x="1080" y="118" width="80" height="76"/>
  <text class="s" x="1097" y="162">Guides</text>

  <rect class="card" x="1080" y="330" width="96" height="76"/>
  <text class="s" x="1094" y="374">Reference</text>

  <path class="path" d="M 260 262 C 284 262, 296 262, 320 262"/>
  <path class="path" d="M 500 262 C 524 262, 536 262, 560 262"/>
  <path class="path" d="M 740 262 C 772 262, 778 198, 820 198"/>
  <path class="path" d="M 740 262 C 772 262, 778 326, 820 326"/>
  <path class="path" d="M 1040 198 C 1060 198, 1064 168, 1080 156"/>
  <path class="path" d="M 1040 326 C 1060 326, 1064 356, 1080 368"/>

  <text class="s" x="820" y="430">Use workflows and guides when you are learning patterns. Use reference when you already know the question.</text>
</svg>
